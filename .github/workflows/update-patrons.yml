name: Update Patrons List

on:
  schedule:
    # Run daily at 6:00 AM UTC
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      force_release:
        description: 'Force release even if no changes'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  actions: write
  id-token: write

jobs:
  update-patrons:
    runs-on: warcraft-runners
    # Only run on the original repository, not forks
    if: github.repository == 'peavers-warcraft/PeaversCommons'
    steps:
      - name: Mint GitHub App token (Vault OIDC)
        id: ghtoken
        uses: peavers/.github/actions/gh-app-token@main

      # Patreon creds live in Vault (single source of truth). DISCORD_WEBHOOK_URL
      # stays a GitHub secret on purpose (also used by notify-failure on ubuntu-latest).
      - name: Fetch Patreon secrets from Vault
        uses: hashicorp/vault-action@v3
        with:
          url: https://vault.vault.svc.cluster.local:8200
          method: jwt
          path: jwt-github
          role: ci
          jwtGithubAudience: https://vault.internal
          tlsSkipVerify: true
          exportToken: false
          secrets: |
            kv/data/cluster/_shared/patreon access_token | PATREON_ACCESS_TOKEN ;
            kv/data/cluster/_shared/patreon campaign_id  | PATREON_CAMPAIGN_ID

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.ghtoken.outputs.token }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch patrons from Patreon
        id: update
        env:
          # PATREON_ACCESS_TOKEN / PATREON_CAMPAIGN_ID exported to env by the Vault step above.
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python scripts/update_patrons.py

      - name: Check for changes and commit
        id: commit
        run: |
          if git diff --quiet src/Core/PatronsInit.lua; then
            echo "No changes detected in patron list"
            echo "committed=false" >> $GITHUB_OUTPUT
          else
            echo "Changes detected, committing..."
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add src/Core/PatronsInit.lua
            git commit -m "chore: Update patron list from Patreon"
            git push
            echo "committed=true" >> $GITHUB_OUTPUT
          fi

      - name: Force commit (if requested with no changes)
        if: inputs.force_release == true && steps.commit.outputs.committed != 'true'
        run: |
          echo "Force release requested but no changes - creating empty commit"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "chore: Force patron list update"
          git push

      # Note: The push to master will automatically trigger the release.yml workflow
